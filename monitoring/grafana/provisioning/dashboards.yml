# ============================================================
# Grafana — Dashboard provisioning configuration
# ============================================================

apiVersion: 1

providers:
  - name: "Container Security Falcon"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
