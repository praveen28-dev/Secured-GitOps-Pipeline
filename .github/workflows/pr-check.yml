# ============================================================
# Container Security Falcon — Pull Request Check
#
# Lightweight validation for PRs (no build, no push).
# Runs linting, tests, and Dockerfile policy checks only.
# ============================================================

name: "🔍 PR Check"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pr-validation:
    name: "🔍 Validate PR"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint code
        run: |
          flake8 app/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Validate Dockerfile policies
        run: |
          # Install Conftest
          CONFTEST_VERSION="0.56.0"
          wget -q "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar xzf "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          sudo mv conftest /usr/local/bin/

          conftest test Dockerfile --policy policy/ --all-namespaces

      - name: PR Summary
        if: success()
        run: |
          echo "## ✅ PR Validation Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Code linting passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dockerfile policies compliant" >> $GITHUB_STEP_SUMMARY
