# ============================================================
# Container Security Falcon — Nginx Reverse Proxy
#
# Security Features:
#   ✅ Security headers on all responses
#   ✅ Rate limiting (10 req/s burst 20)
#   ✅ Request size limits (1MB max body)
#   ✅ Server tokens hidden
#   ✅ Timeout protection
#   ✅ Access logging for audit trail
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging Format ─────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Security ───────────────────────────────────────────
    server_tokens off;                    # Hide Nginx version
    client_max_body_size 1m;             # Limit request body size
    client_body_timeout 10s;             # Timeout for reading body
    client_header_timeout 10s;           # Timeout for reading headers
    send_timeout 10s;                     # Timeout for sending response

    # ── Rate Limiting ──────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_status 429;

    # ── Upstream Application ───────────────────────────────
    upstream falcon_app {
        server app:8000;
    }

    server {
        listen 80;
        server_name _;

        # ── Security Headers ──────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── Health Check (bypass rate limiting) ────────────
        location /health {
            proxy_pass http://falcon_app/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # No rate limiting on health checks
            access_log off;
        }

        location /ready {
            proxy_pass http://falcon_app/ready;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        # ── Metrics (internal only in production) ──────────
        location /metrics {
            proxy_pass http://falcon_app/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # In production, restrict to internal networks only
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # deny all;
        }

        # ── API Routes (rate limited) ─────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://falcon_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ── Block unwanted paths ──────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Default ───────────────────────────────────────
        location / {
            return 404 '{"error": "Not found", "code": "NOT_FOUND"}';
            add_header Content-Type application/json;
        }
    }
}
