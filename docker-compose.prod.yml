# ============================================================
# Container Security Falcon — Production Overrides
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Adds:
#   - Stricter resource limits
#   - Restart policies
#   - Log rotation
#   - Production environment variables
# ============================================================

services:
  app:
    restart: always
    environment:
      - APP_ENV=production
      - LOG_LEVEL=WARNING
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=1GB"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  grafana:
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
